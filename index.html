  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Custom Confetti Component ---
    const Confetti = ({ zIndex = "z-50", opacity = "opacity-100" }) => {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const pieces = [];
        const colors = ['#fce7f3', '#fbcfe8', '#f9a8d4', '#f472b6', '#fb7185', '#fda4af', '#fff1f2', '#ffe4e6'];
        const emojis = ['🎓', '💜', '🌸', '✨', '🧸'];

        for (let i = 0; i < 150; i++) {
          pieces.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height,
            size: Math.random() * 10 + 5,
            color: colors[Math.floor(Math.random() * colors.length)],
            isEmoji: Math.random() > 0.7,
            emoji: emojis[Math.floor(Math.random() * emojis.length)],
            speed: Math.random() * 3 + 2,
            angle: Math.random() * 360,
            spin: Math.random() * 0.2 - 0.1,
          });
        }

        let animationId;
        const update = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          pieces.forEach((p) => {
            p.y += p.speed;
            p.angle += p.spin;
            if (p.y > canvas.height) {
              p.y = -10;
              p.x = Math.random() * canvas.width;
            }
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.angle);
            
            if (p.isEmoji) {
              ctx.font = `${p.size * 2.5}px Arial`;
              ctx.fillText(p.emoji, -p.size, -p.size);
            } else {
              ctx.fillStyle = p.color;
              ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
            }
            
            ctx.restore();
          });
          animationId = requestAnimationFrame(update);
        };

        update();
        return () => cancelAnimationFrame(animationId);
      }, []);

      return <canvas ref={canvasRef} className={`fixed inset-0 pointer-events-none ${zIndex} ${opacity}`} />;
    };

    // --- Fade In Scroll Component ---
    const FadeInSection = ({ children, delay = "0ms" }) => {
      const [isVisible, setVisible] = useState(false);
      const domRef = useRef();

      useEffect(() => {
        const observer = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              setVisible(true);
              observer.unobserve(domRef.current);
            }
          });
        }, { threshold: 0.15 });
        
        if (domRef.current) observer.observe(domRef.current);
        return () => observer.disconnect();
      }, []);

      return (
        <div
          ref={domRef}
          className={`transition-all duration-1000 ease-out transform ${
            isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10'
          }`}
          style={{ transitionDelay: delay }}
        >
          {children}
        </div>
      );
    };

    // --- Secret Note Component ---

            </div>
          )}

      );
    };
